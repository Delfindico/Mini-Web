<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Web Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url("detective.gif") no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      position: absolute;
      top: 43%;
      left: 46%;
      transform: translate(-50%, -50%);
    }

    .wave span {
      display: inline-block;
      font-size: 40px;
      font-weight: bold;
      color: #df1b0d;
      animation: waveBounce 1s infinite;
    }

    @keyframes waveBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .text-box {
      position: absolute;
      transform: translate(-50%, -50%);
      background-color: #da53bd;
      font-size: 20px;
      font-weight: bold;
      padding: 15px;
      border: 2px solid #2c3e50;
      border-radius: 10px;
      text-align: center;
      max-width: 400px;
      text-decoration: none; /* remove underline */
      display: inline-block;
    }

    /* ✅ Link states */
    .text-box:link {
      color: #2c3e50; /* default text color */
      background-color: #da53bd; /* default background */
    }

    .text-box:visited {
      color: white;
      background-color: #d148bf; /* darker purple when visited */
    }

    .text-box:hover {
      color: white;
      background-color: #6db0dd; /* light blue on hover */
    }

    .text-box:active {
      color: #fff;
      background-color: #e74c3c; /* red when clicked */
    }

    .photos-link { top: 65%; left: 30%; }
    .hobby-link { top: 75%; left: 30%; }

    .custom-image {
      width: 160px;
      position: absolute;
      top: 250px;
      left: 380px;
      border: 3px solid white;
      border-radius: 10px;
    }

    .custom-audio {
      position: absolute;
      top: var(--audio-top, 330px);
      left: var(--audio-left, 60px);
      width: 300px;
    }

    .explanation {
      position: absolute;
      top: var(--explanation-top, 820px);
      left: var(--explanation-left, 400px);
      font-size: 28px;
      font-weight: bold;
      color: rgb(67, 201, 74);
      text-shadow: 2px 2px 4px black;
    }

    .description-box {
      position: absolute;
      top: var(--desc-top, 850px);
      left: var(--desc-left, 600px);
      background-color: #2bf0d5;
      border: 2px solid rgb(255, 250, 250);
      border-radius: 10px;
      padding: 15px;
    }

    .description-box p {
      color: #1b0d0d;
      font-size: 18px;
      text-shadow: 1px 1px 3px rgb(243, 239, 239);
    }

    .video-box {
      position: absolute;
      top: var(--video-top, 200px);
      left: var(--video-left, 200px);
    }
  </style>
</head>
<body>
  <h1>
    <div class="wave">
      <span>A</span><span>l</span><span>l</span><span> </span>
      <span>a</span><span>b</span><span>o</span><span>u</span><span>t</span><span> </span>
      <span>m</span><span>e</span>
    </div>
  </h1>

  <a href="about.html" class="text-box photos-link">About   </a>
  <a href="contact.html" class="text-box hobby-link">Contact</a>

  <img src="Myself.jpg" alt="me" class="custom-image">

  <audio controls class="custom-audio" style="--audio-top:680px; --audio-left:580px;">
    <source src="explanation1.mp3" type="audio/mpeg">
    <source src="explanation1.ogg" type="audio/ogg">
    Your browser does not support the audio element.
  </audio>

  <h1 class="explanation" style="--explanation-top:650px; --explanation-left:700px;">
    Explanation
  </h1>

  <div class="text-box description-box" style="--desc-top:350px; --desc-left:1200px;">
    <p>This is the homepage of my project. I kept it simple because I want visitors to quickly understand what the site is about. It’s basically the starting point where you get a first impression of everything inside..</p>
  </div>

  <video class="video-box" width="400" height="360" controls 
         style="--video-top:400px; --video-left:1000px;">
    <source src="previous.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    <source src="video.ogg" type="video/ogg">
    Your browser does not support the video tag.
  </video>
</body>
</html>
